services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_LAUNCH_ARGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage
    expose:
      - "4000"
    volumes:
      - vuln_report_data:/app/data
      - vuln_report_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  vuln_report_data:
  vuln_report_uploads:
